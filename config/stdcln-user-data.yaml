#cloud-config
autoinstall:
  version: 1
  # early-commands:
  #   - /bin/bash /cdrom/scripts/early-commands.sh
  refresh-installer:
    update: no
  drivers:
    install: false
  apt:
    disable_suites: [security, updates, backports]
    preserve_sources_list: true
  identity:
    hostname: streamscope
    password: $6$u6slVnS15m$BeFZZAbp477XBu9Btar7YJ2BSfMWQx4BTlgBQDuq0ZS8yJqbbyc4hN44VtxLitU/IY1L6fhTJkcWj3y6HiNSB1
    realname: Triveni Digital
    username: triveni
  locale: en_US.UTF-8
  network:
    version: 2
    ethernets: {}
  storage:
    version: 1
    config:
    - {type: disk, id: disk-root, ptable: gpt, match: {path: "/dev/[sv]da"}, wipe: superblock-recursive, preserve: false, name: '', grub_device: true}
    - {type: partition, id: partition-0, device: disk-root, size: 1048576, flag: bios_grub, number: 1, preserve: false, grub_device: false}
    - {type: partition, id: partition-1, device: disk-root, size: 40G, wipe: superblock, flag: '', number: 2, preserve: false, grub_device: false}
    - {type: partition, id: partition-2, device: disk-root, size: -1, wipe: superblock, flag: '', number: 3, preserve: false, grub_device: false}
    - {fstype: ext4, volume: partition-1, preserve: false, type: format, id: format-0, label: root}
    - {fstype: ext4, volume: partition-2, preserve: false, type: format, id: format-1, label: triveni}
    - {path: /, device: format-0, type: mount, id: mount-0}
    - {path: /var/triveni, device: format-1, type: mount, id: mount-1}
  user-data:
    disable_root: false
    # cloud-config sets the timezone after guidebuilder has started
    # modify scripts/late-command.sh to change
    # timezone: America/New_York
  late-commands:
    - /cdrom/scripts/copy-resources-to-target.sh
    - curtin in-target --target=/target -- /cdrom/scripts/revert-kernel.sh
    - curtin in-target --target=/target -- /cdrom/scripts/install-debians.sh
    - curtin in-target --target=/target -- /cdrom/scripts/rename-ifaces.sh
    - curtin in-target --target=/target -- /cdrom/scripts/finalize-os.sh
    - curtin in-target --target=/target -- /var/triveni/install/install-ssxm.sh
    - curtin in-target --target=/target -- /var/triveni/install/install-ssmt.sh
    - curtin in-target --target=/target -- /var/triveni/install/install-triveni-drivers.sh
  shutdown: 'poweroff'

# to find errors in this script:
# tail -n 50 /var/log/installer/subiquity-server-debug.log